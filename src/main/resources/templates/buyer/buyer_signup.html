<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구매자 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="../../static/css/style.css" />
</head>
<body>

<!-- 🏠 홈으로 이동 버튼 -->
<a th:href="@{/}"><img th:src="@{/images/free-icon-sprout-7101338.png}" alt="홈으로" style="width:48px;height:48px;margin:20px 0 0 20px;position:fixed;left:20px;top:20px;z-index:100;"></a>
<a href="/"><img src="/images/free-icon-sprout-7101338.png" alt="홈으로" style="width:48px;height:48px;margin:20px 0 0 20px;position:fixed;left:20px;top:20px;z-index:100;"></a>

<!-- 👤 구매자 회원가입 폼 -->
<form id="buyer-signup-form" class="buyer-form" th:action="@{/buyer/signup}" method="post">
  <h2>구매자 회원가입</h2>

  <!-- 이름 -->
  <div class="form-row">
    <label for="name">이름</label>
    <div class="input-col">
      <input type="text" id="name" name="name" required />
      <div class="error-msg" id="error-name"></div>
    </div>
  </div>

  <!-- 닉네임 -->
  <div class="form-row">
    <label for="nickname">닉네임</label>
    <div class="input-col">
      <input type="text" id="nickname" name="nickname" required />
      <div class="error-msg" id="error-nickname"></div>
    </div>
  </div>

  <!-- 이메일 -->
  <div class="form-row">
    <label for="email">이메일</label>
    <div class="input-col">
      <input type="email" id="email" name="email" required />
      <div class="error-msg" id="error-email"></div>
    </div>
  </div>

  <!-- 비밀번호 -->
  <div class="form-row">
    <label for="password">비밀번호</label>
    <div class="input-col">
      <input type="password" id="password" name="password" required />
      <div class="error-msg" id="error-password"></div>
    </div>
  </div>

  <!-- 비밀번호 확인 -->
  <div class="form-row">
    <label for="password2">비밀번호 확인</label>
    <div class="input-col">
      <input type="password" id="password2" name="password2" required />
      <div class="error-msg" id="error-password2"></div>
    </div>
  </div>

  <!-- 전화번호 -->
  <div class="form-row">
    <label for="tel">전화번호</label>
    <div class="input-col">
      <input type="text" id="tel" name="tel" maxlength="13" placeholder="010-1234-5678" required />
      <div class="error-msg" id="error-tel"></div>
    </div>
  </div>

  <!-- 성별 -->
  <div class="form-row">
    <label for="gender">성별</label>
    <div class="input-col">
      <select id="gender" name="gender" required>
        <option value="">선택</option>
        <option value="male">남성</option>
        <option value="female">여성</option>
      </select>
      <div class="error-msg" id="error-gender"></div>
    </div>
  </div>

  <!-- 생년월일 -->
  <div class="form-row">
    <label for="birth">생년월일</label>
    <div class="input-col">
      <input type="date" id="birth" name="birth" required />
      <div class="error-msg" id="error-birth"></div>
    </div>
  </div>

  <!-- 주소 -->
  <div class="form-row">
    <label for="address">주소</label>
    <div class="input-col">
      <input type="text" id="address" name="address" required />
      <div class="error-msg" id="error-address"></div>
    </div>
  </div>

  <!-- ▶ 회원가입 버튼 -->
  <button type="submit">회원가입</button>
</form>

<!-- 📜 JS 스크립트 -->
<script th:src="@{/js/buyer/buyer_signup.js}"></script>
<script src="../../static/js/buyer/buyer_signup.js"></script>
</body>
</html>
