<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구매자 정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<a th:href="@{/}" class="home-button">🏠 홈으로</a>

<form id="buyer-update-form" class="buyer-form">
    <h2>구매자 정보 수정</h2>

    <div class="form-row">
        <label for="email">이메일 (수정 불가)</label>
        <input type="email" id="email" name="email" readonly class="readonly-field" />
    </div>

    <div class="form-row">
        <label for="name">이름 (수정 불가)</label>
        <input type="text" id="name" name="name" readonly class="readonly-field" />
    </div>

    <div class="form-row">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" name="nickname" placeholder="새 닉네임 입력" required />
    </div>

    <div class="form-row">
        <label for="tel">연락처</label>
        <input type="tel" id="tel" name="tel" placeholder="새 연락처 입력" required />
    </div>

    <div class="form-row">
        <label for="address">주소</label>
        <input type="text" id="address" name="address" placeholder="새 주소 입력" required />
    </div>

    <div class="form-row">
        <label for="currentPassword">현재 비밀번호</label>
        <input type="password" id="currentPassword" name="currentPassword"
               placeholder="정보 수정을 위해 현재 비밀번호를 입력하세요" required />
    </div>

    <div class="button-group">
        <button type="submit" class="btn-primary">정보 수정</button>
        <button type="button" id="cancel-btn" class="btn-secondary">취소</button>
    </div>
</form>

<script th:src="@{/static/js/buyer_update.js}"></script>
</body>
</html>
