<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매자 마이페이지</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        .mypage-container {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
        }
        .welcome-message {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #333;
        }
        .mypage-menu {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .mypage-menu button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-primary {
            background-color: #28a745;
            color: white;
        }
        .btn-primary:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
<a th:href="@{/}" class="home-button">🏠 홈으로</a>
<div class="mypage-container">
    <h1 class="welcome-message">판매자 마이페이지</h1>
    <div class="mypage-menu">
        <button class="btn-primary">판매 상품 관리</button>
        <button class="btn-primary">판매 내역 관리</button>
        <button class="btn-primary">고객 관리</button>
        <button class="btn-primary">판매자 정보 관리</button>
    </div>
</div>

<script th:src="@{/js/seller/mypage.js}"></script>
</body>
</html>
