<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판매자 로그인</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="../../static/css/style.css" />
</head>
<body>

<!-- 🏠 홈으로 이동 버튼 -->
<a th:href="@{/}"><img th:src="@{/images/free-icon-sprout-7101338.png}" alt="홈으로" style="width:48px;height:48px;margin:20px 0 0 20px;position:fixed;left:20px;top:20px;z-index:100;"></a>
<a href="/"><img src="/images/free-icon-sprout-7101338.png" alt="홈으로" style="width:48px;height:48px;margin:20px 0 0 20px;position:fixed;left:20px;top:20px;z-index:100;"></a>

<!-- 🛒 판매자 로그인 폼 -->
<form class="seller-form" th:action="@{/seller/login}" method="post">
  <h2>판매자 로그인</h2>

  <!-- 이메일 -->
  <div class="form-row">
    <label for="email">이메일</label>
    <div class="input-col">
      <input type="email" id="email" name="email" placeholder="이메일 입력" autocomplete="email" required />
    </div>
  </div>

  <!-- 비밀번호 -->
  <div class="form-row">
    <label for="password">비밀번호</label>
    <div class="input-col">
      <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required />
    </div>
  </div>

  <!-- 로그인 버튼 -->
  <button type="submit">로그인</button>
</form>

<script src="../../static/js/seller/seller_login.js"></script>
<script th:src="@{/js/seller/seller_login.js}"></script>
</body>
</html>
